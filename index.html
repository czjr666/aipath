<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- 站内已内置中英文切换；禁用浏览器网页翻译，避免其改写文本节点后 React 协调时
       removeChild 报错（在内容最密的 L30 切换时尤为明显，会整页白屏）。 -->
        <meta name="google" content="notranslate" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>AI 通识课 · 为中文学习者设计的 AI 入门课</title>
        <meta
            name="description"
            content="零基础 AI 课程：用可视化与交互演示讲透 AI 核心原理，6 个阶段 30 课，从神经网络直觉到亲手构建 AI 应用，专为中文学习者设计。"
        />

        <!-- 规范链接 -->
        <link rel="canonical" href="https://aipath.buynao.com/" />

        <!-- Open Graph（微信 / Facebook / Slack 等） -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="AI 通识课" />
        <meta
            property="og:title"
            content="AI 通识课 · 为中文学习者设计的 AI 入门课"
        />

            property="og:description"
            content="零基础 AI 课程：用可视化与交互演示讲透 AI 核心原理，6 个阶段 30 课，从神经网络直觉到亲手构建 AI 应用，专为中文学习者设计。"
        />
        <meta property="og:url" content="https://aipath.buynao.com/" />
        <meta
            property="og:image"
            content="https://aipath.buynao.com/og-image.png"
        />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta
            property="og:image:alt"
            content="AI 通识课 · 为中文学习者设计的 AI 入门课"
        />
        <meta property="og:locale" content="zh_CN" />

        <!-- Twitter / X 卡片 -->
        <meta name="twitter:card" content="summary_large_image" />

            name="twitter:title"
            content="AI 通识课 · 为中文学习者设计的 AI 入门课"

        />

            name="twitter:image"
            content="https://aipath.buynao.com/og-image.png"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
